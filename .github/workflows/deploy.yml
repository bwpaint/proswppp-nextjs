name: Deploy to xCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/www2.proswppp.com
            git checkout main
            git pull origin main
            npm run build
            pm2 restart proswppp || pm2 start ecosystem.config.js
            pm2 save
