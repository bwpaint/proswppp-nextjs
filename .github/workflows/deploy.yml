name: Deploy to xCloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          WWCO_API_KEY: ${{ secrets.WWCO_API_KEY }}
          WWCO_API_URL: ${{ secrets.WWCO_API_URL }}
          NEXT_PUBLIC_WP_API_URL: ${{ secrets.NEXT_PUBLIC_WP_API_URL }}
          WEBWIZE_API_KEY: ${{ secrets.WEBWIZE_API_KEY }}
          WWRM_API_KEY: ${{ secrets.WWRM_API_KEY }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}

      - name: Sync built files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ".next,public,package.json,pnpm-lock.yaml,next.config.js,next.config.mjs"
          target: "/var/www/www2.proswppp.com"
          overwrite: true

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            npm install -g pnpm --silent 2>/dev/null || true
            cd /var/www/www2.proswppp.com
            pnpm install --prod --frozen-lockfile
            pm2 restart proswppp || pm2 start ecosystem.config.js
            pm2 save
